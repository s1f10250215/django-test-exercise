{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>To Do Application</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" href="{% static 'todo/css/style.css' %}">
  </head>

  <body>
    <div>
      {% if current_language == 'ja' %}
      <a href="{% url 'switch_language' 'en' %}?next={{ request.get_full_path|urlencode }}">English</a>
      {% else %}
      <a href="{% url 'switch_language' 'ja' %}?next={{ request.get_full_path|urlencode }}">日本語</a>
      {% endif %}
    </div>
    {% if current_language == 'ja' %}
    <h1>タスクを編集</h1>
    <p>以下のフォームからタスクを編集できます。</p>
    <form action="{% url 'update' task.id%}" method="post">
      {% csrf_token %}
      <div>
        <label for="titleInput">タイトル</label><br>
        <input id="titleInput" name="title" type="text" placeholder="タイトルを入力" value="{{ task.title }}">
      </div>
      <div>
        <label for="dueInput">期限:</label><br>
        <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at |date:'Y-m-d H:i' }}">
      </div>
      <div>
        <label for="priorityInput">優先度:</label><br>
        <select id="priorityInput" name="priority">
          <option value="high" {% if task.priority == 'high' %}selected{% endif %}>高</option>
          <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>中</option>
          <option value="low" {% if task.priority == 'low' %}selected{% endif %}>低</option>
        </select>
      </div>
      <div>
        <button type="submit">送信</button>
      </div>
    </form>
    <br>
    {% else %}
    <h1>Edit task</h1>
    <p>You can edit tasks from the following form.</p>
    <form action="{% url 'update' task.id%}" method="post">
      {% csrf_token %}
      <div>
        <label for="titleInput">Title</label><br>
        <input id="titleInput" name="title" type="text" placeholder="Input title" value="{{ task.title }}">
      </div>
      <div>
        <label for="dueInput">Due at:</label><br>
        <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at |date:'Y-m-d H:i' }}">
      </div>
      <div>
        <label for="priorityInput">Priority:</label><br>
        <select id="priorityInput" name="priority">
          <option value="high" {% if task.priority == 'high' %}selected{% endif %}>High</option>
          <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>Medium</option>
          <option value="low" {% if task.priority == 'low' %}selected{% endif %}>Low</option>
        </select>
      </div>
      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
    <br>
    {% endif %}
  </body>

</html>
